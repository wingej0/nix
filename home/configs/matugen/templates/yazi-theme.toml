# yazi theme — generated by matugen (Material Design 3)

[manager]
cwd = { fg = "{{colors.primary.default.hex}}" }

hovered = { bg = "{{colors.primary_container.default.hex}}", fg = "{{colors.on_primary_container.default.hex}}" }
preview_hovered = { underline = true }

find_keyword = { fg = "{{colors.tertiary.default.hex}}", bold = true }
find_position = { fg = "{{colors.secondary.default.hex}}", italic = true }

marker_selected = { fg = "{{colors.primary.default.hex}}", bg = "{{colors.primary.default.hex}}" }
marker_copied = { fg = "{{colors.tertiary.default.hex}}", bg = "{{colors.tertiary.default.hex}}" }
marker_cut = { fg = "{{colors.error.default.hex}}", bg = "{{colors.error.default.hex}}" }

tab_active = { fg = "{{colors.on_primary.default.hex}}", bg = "{{colors.primary.default.hex}}" }
tab_inactive = { fg = "{{colors.on_surface_variant.default.hex}}", bg = "{{colors.surface_variant.default.hex}}" }
tab_width = 1

border_symbol = "│"
border_style = { fg = "{{colors.outline_variant.default.hex}}" }

[status]
separator_open = ""
separator_close = ""
separator_style = { fg = "{{colors.surface_variant.default.hex}}", bg = "{{colors.surface_variant.default.hex}}" }

mode_normal = { fg = "{{colors.on_primary.default.hex}}", bg = "{{colors.primary.default.hex}}", bold = true }
mode_select = { fg = "{{colors.on_tertiary.default.hex}}", bg = "{{colors.tertiary.default.hex}}", bold = true }
mode_unset = { fg = "{{colors.on_error.default.hex}}", bg = "{{colors.error.default.hex}}", bold = true }

progress_label = { fg = "{{colors.on_surface.default.hex}}", bold = true }
progress_normal = { fg = "{{colors.primary.default.hex}}", bg = "{{colors.surface_variant.default.hex}}" }
progress_error = { fg = "{{colors.error.default.hex}}", bg = "{{colors.surface_variant.default.hex}}" }

permissions_t = { fg = "{{colors.primary.default.hex}}" }
permissions_r = { fg = "{{colors.tertiary.default.hex}}" }
permissions_w = { fg = "{{colors.error.default.hex}}" }
permissions_x = { fg = "{{colors.secondary.default.hex}}" }
permissions_s = { fg = "{{colors.outline.default.hex}}" }

[input]
border = { fg = "{{colors.primary.default.hex}}" }
title = {}
value = {}
selected = { reversed = true }

[select]
border = { fg = "{{colors.primary.default.hex}}" }
active = { fg = "{{colors.primary.default.hex}}", bold = true }
inactive = {}

[tasks]
border = { fg = "{{colors.primary.default.hex}}" }
title = {}
hovered = { fg = "{{colors.primary.default.hex}}", underline = true }

[which]
mask = { bg = "{{colors.surface.default.hex}}" }
cand = { fg = "{{colors.tertiary.default.hex}}" }
rest = { fg = "{{colors.outline.default.hex}}" }
desc = { fg = "{{colors.secondary.default.hex}}" }
separator = "  "
separator_style = { fg = "{{colors.outline_variant.default.hex}}" }

[help]
on = { fg = "{{colors.primary.default.hex}}" }
run = { fg = "{{colors.secondary.default.hex}}" }
desc = { fg = "{{colors.on_surface_variant.default.hex}}" }
hovered = { bg = "{{colors.primary_container.default.hex}}", fg = "{{colors.on_primary_container.default.hex}}", bold = true }
footer = { fg = "{{colors.on_surface.default.hex}}", bg = "{{colors.surface_variant.default.hex}}" }

[filetype]

rules = [
  # Media
  { mime = "image/*", fg = "{{colors.tertiary.default.hex}}" },
  { mime = "video/*", fg = "{{colors.secondary.default.hex}}" },
  { mime = "audio/*", fg = "{{colors.secondary.default.hex}}" },

  # Archives
  { mime = "application/zip", fg = "{{colors.error.default.hex}}" },
  { mime = "application/gzip", fg = "{{colors.error.default.hex}}" },
  { mime = "application/x-tar", fg = "{{colors.error.default.hex}}" },
  { mime = "application/x-bzip*", fg = "{{colors.error.default.hex}}" },
  { mime = "application/x-7z-compressed", fg = "{{colors.error.default.hex}}" },
  { mime = "application/x-rar", fg = "{{colors.error.default.hex}}" },
  { mime = "application/x-xz", fg = "{{colors.error.default.hex}}" },

  # Documents
  { mime = "application/doc", fg = "{{colors.primary.default.hex}}" },
  { mime = "application/pdf", fg = "{{colors.primary.default.hex}}" },
  { mime = "application/rtf", fg = "{{colors.primary.default.hex}}" },
  { mime = "application/vnd.*", fg = "{{colors.primary.default.hex}}" },

  # Fallback
  { name = "*", fg = "{{colors.on_surface.default.hex}}" },
  { name = "*/", fg = "{{colors.primary.default.hex}}" },
]
